minimum_cumulusci_version: '3.78.0'
project:
    name: Demo-Test
    package:
        name: Demo-Test
        api_version: '64.0'
    git:
        default_branch: 'main'
        prefix_feature: 'feature/'
        prefix_beta: 'beta/'
        prefix_release: 'release/'
    source_format: sfdx

tasks:
    robot:
        options:
            suites: robot/Demo-Test/tests
            options:
                outputdir: robot/Demo-Test/results

    robot_testdoc:
        options:
            path: robot/Demo-Test/tests
            output: robot/Demo-Test/doc/Demo-Test_tests.html

    run_tests:
        options:
            required_org_code_coverage_percent: 75
